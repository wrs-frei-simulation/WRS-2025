format_version: 2.0
robot_list: &RobotList [ AizuSpiderDS-ROS2, HobbyDrone-ROS2 ]

registrations:
  - &PS
    name: PS-ALL
    task_project: [ PS/A1, PS/A2, PS/A3, PS/A4, PS/Common ]
    robot_project: *RobotList
    robot_alignment: X+
    start_position: [ -8.5, -5.0, 0.0 ]
    simulator_project: [ AGXSimulator, AISTSimulator ]
    view_project: PS/RefereeView
    enable_recording: true
    # enable_tracking: true
    enable_ros: true
  - <<: *PS
    name: PS-1
    task_project: [ PS/A1, PS/Common ]
    robot_alignment: X+
    start_position: [ -8.5, -5.0, 0.0 ]
  - <<: *PS
    name: PS-2
    task_project: [ PS/A2, PS/Common ]
    robot_alignment: X-
    start_position: [ 8.5, -5.0, 0.0 ]
  - <<: *PS
    name: PS-3
    task_project: [ PS/A3, PS/Common ]
    robot_alignment: X-
    start_position: [ 8.5, 5.0, 0.0 ]
  - <<: *PS
    name: PS-4
    task_project: [ PS/A4, PS/Common ]
    robot_alignment: X+
    start_position: [ -8.5, 5.0, 0.0 ]