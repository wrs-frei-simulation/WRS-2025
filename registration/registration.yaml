format_version: 2.0
robot_list: &RobotList [ MonoCrawlerNA-ROS2, HobbyDrone-ROS2 ]

registrations:
  - &Mission3
    name: M3
    task_project: [ M3/B1, M3/1F, M3/2F, M3/3F, M3/4F, M3/Common ]
    robot_project: *RobotList
    robot_alignment: X+
    start_position: [ -16.0, -16.0, 0.0 ]
    simulator_project: [ AGXSimulator, AISTSimulator ]
    view_project: M3/RefereeView1
    enable_recording: true
    # enable_tracking: true
    enable_ros: true
  - <<: *Mission3
    name: M3-B1
    task_project: [ M3/B1, M3/Common ]
    robot_alignment: X+
    start_position: [ -16.0, -16.0, -11.0 ]
    view_project: M3/RefereeView0
  - <<: *Mission3
    name: M3-1F
    task_project: [ M3/1F, M3/Common ]
    robot_alignment: X+
    start_position: [ -16.0, -16.0, 0 ]
    view_project: M3/RefereeView1
  - <<: *Mission3
    name: M3-2F
    task_project: [ M3/2F, M3/Common ]
    robot_alignment: X+
    start_position: [ -16.0, -16.0, 11.0 ]
    view_project: M3/RefereeView2
  - <<: *Mission3
    name: M3-3F
    task_project: [ M3/3F, M3/Common ]
    robot_alignment: X+
    start_position: [ -16.0, -16.0, 22.0 ]
    view_project: M3/RefereeView3
  - <<: *Mission3
    name: M3-4F
    task_project: [ M3/4F, M3/Common ]
    robot_alignment: X+
    start_position: [ -16.0, -16.0, 33.0 ]
    view_project: M3/RefereeView4