format_version: 2.0
robot_list: &RobotList [ MonoCrawlerNA-ROS2, HobbyDrone-ROS2 ]

registrations:
  - &Mission2
    name: PS-1
    task_project: [ PS/PS-1, PS/PS-Common ]
    robot_project: *RobotList
    robot_alignment: Y-
    start_position: [ -7.0, -4.0, 0.0 ]
    simulator_project: [ AGXSimulator, AISTSimulator ]
    view_project: PS/RefereeView
    enable_recording: true
    # enable_tracking: true
    enable_ros: true
  - <<: *Mission2
    name: PS-2
    task_project: [ PS/PS-2, PS/PS-Common ]
    robot_alignment: X+
    start_position: [ 4.0, -7.0, 0.0 ]
  - <<: *Mission2
    name: PS-3
    task_project: [ PS/PS-3, PS/PS-Common ]
    robot_alignment: Y+
    start_position: [ 7.0, 4.0, 0.0 ]
  - <<: *Mission2
    name: PS-4
    task_project: [ PS/PS-4, PS/PS-Common ]
    robot_alignment: X-
    start_position: [ -4.0, 7.0, 0.0 ]
  - <<: *Mission2
    name: PS-12
    task_project: [ PS/PS-1, PS/PS-2, PS/PS-Common ]
    robot_alignment: Y-
    start_position: [ -7.0, -4.0, 0.0 ]
  - <<: *Mission2
    name: PS-34
    task_project: [ PS/PS-3, PS/PS-4, PS/PS-Common ]
    robot_alignment: Y+
    start_position: [ 7.0, 4.0, 0.0 ]
  - &Mission3
    name: ValveOperation
    task_project: [ M3/ValveOperation ]
    robot_project: *RobotList
    robot_alignment: X+
    start_position: [ -9.0, 0.0, 0.0 ]
    simulator_project: [ AGXSimulator, AISTSimulator ]
    view_project: M3/RefereeView
    enable_recording: true
    # enable_tracking: true
    enable_ros: true
  - { <<: *Mission3, name: FireFighting, task_project: [ M3/FireFighting ] }